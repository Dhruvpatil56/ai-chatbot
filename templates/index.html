<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .chat-header {
            padding: 20px 24px;
            background: #111;
            border-bottom: 1px solid #2a2a2a;
            font-size: 18px;
            font-weight: 600;
            color: #00d4aa;
        }

        .chat-header span {
            font-size: 13px;
            color: #666;
            font-weight: 400;
            margin-left: 10px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message-wrapper.user { align-items: flex-end; }
        .message-wrapper.bot { align-items: flex-start; }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.8;
            word-wrap: break-word;
        }

        .message.user {
            background: #00d4aa;
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: #2a2a2a;
            color: #eee;
            border-bottom-left-radius: 4px;
        }

        .message.typing {
            background: #2a2a2a;
            color: #666;
        }

        /* Markdown styling inside bot messages */
        .message.bot p { margin-bottom: 10px; }
        .message.bot p:last-child { margin-bottom: 0; }
        .message.bot ul, .message.bot ol { padding-left: 20px; margin-bottom: 10px; }
        .message.bot li { margin-bottom: 6px; }
        .message.bot h1, .message.bot h2, .message.bot h3 {
            margin-bottom: 8px;
            color: #00d4aa;
        }
        .message.bot strong { color: #fff; }
        .message.bot code {
            background: #111;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            color: #00d4aa;
        }
        .message.bot pre {
            background: #111;
            padding: 12px 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            border-left: 3px solid #00d4aa;
        }
        .message.bot pre code {
            background: none;
            padding: 0;
            color: #eee;
            font-size: 13px;
        }

        /* Copy button */
        .copy-btn {
            font-size: 12px;
            color: #555;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: color 0.2s;
            align-self: flex-start;
        }
        .copy-btn:hover { color: #00d4aa; }
        .copy-btn.copied { color: #00d4aa; }

        .chat-input {
            display: flex;
            padding: 16px 24px;
            gap: 12px;
            background: #111;
            border-top: 1px solid #2a2a2a;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        .chat-input input:focus { border-color: #00d4aa; }

        .chat-input button {
            padding: 12px 24px;
            background: #00d4aa;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-input button:hover { background: #00b894; }
        .chat-input button:disabled { background: #333; color: #666; cursor: not-allowed; }

        #clearBtn {
            padding: 12px 18px;
            background: #2a2a2a;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #clearBtn:hover { background: #ff6b6b; color: #000; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            🤖 AI Chatbot <span>powered by Groq + LLaMA 3</span>
        </div>
        <div class="chat-messages" id="messages">
            <div class="message-wrapper bot">
                <div class="message bot">Hey! I'm your AI assistant. Ask me anything 👋</div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off"/>
            <button id="clearBtn" onclick="clearChat()">Clear</button>
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById("messages");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");

        // Configure marked
        marked.setOptions({ breaks: true, gfm: true });

        userInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        function scrollToBottom() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addMessage(text, role) {
            const wrapper = document.createElement("div");
            wrapper.classList.add("message-wrapper", role);

            const div = document.createElement("div");
            div.classList.add("message", role);

            if (role === "bot") {
                div.innerHTML = marked.parse(text);

                // Copy button
                const copyBtn = document.createElement("button");
                copyBtn.classList.add("copy-btn");
                copyBtn.textContent = "📋 Copy";
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(text);
                    copyBtn.textContent = "✅ Copied!";
                    copyBtn.classList.add("copied");
                    setTimeout(() => {
                        copyBtn.textContent = "📋 Copy";
                        copyBtn.classList.remove("copied");
                    }, 2000);
                };

                wrapper.appendChild(div);
                wrapper.appendChild(copyBtn);
            } else {
                div.textContent = text;
                wrapper.appendChild(div);
            }

            messagesDiv.appendChild(wrapper);
            scrollToBottom();
            return div;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.value = "";
            sendBtn.disabled = true;

            addMessage(message, "user");
            const typingWrapper = document.createElement("div");
            typingWrapper.classList.add("message-wrapper", "bot");
            const typing = document.createElement("div");
            typing.classList.add("message", "typing");
            typing.textContent = "Thinking...";
            typingWrapper.appendChild(typing);
            messagesDiv.appendChild(typingWrapper);
            scrollToBottom();

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                typingWrapper.remove();
                addMessage(data.reply, "bot");
            } catch (err) {
                typingWrapper.remove();
                addMessage("Something went wrong. Please try again.", "bot");
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        async function clearChat() {
            await fetch("/clear", { method: "POST" });
            messagesDiv.innerHTML = "";
            addMessage("Chat cleared! Start a new conversation 👋", "bot");
        }
    </script>
</body>
</html>
